{% extends 'layout/base.html' %}
{% block title %}Home - ECashFlow{% endblock %}

{% block content %}

    <title>Boletas</title>
<style>

    .content {
        margin: 20px auto;
        text-align: center;
    }
    .btn {
        display: inline-block;
        padding: 10px 20px;
        border-radius: 5px;
        margin: 10px;
    }

    .home-container{
        margin-top: 7%;
    }   

</style>
    
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            padding: 20px 0;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background-color: #ffffff;
            border-radius: 5px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
        }
        .upload-container {
            margin-top: 20px;
        }
        .button-container {
            margin-top: 20px;
        }
        .button {
            display: inline-block;
            background-color: #007bff;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
        .button:hover {
            background-color: #0056b3;
        }
    </style>
<body>
    <div class="header">
        <h1>Pago de Servicios</h1>
    </div>
    <div class="container">
        <h2>Suba una foto del código de barra de la boleta</h2>
        <form action="{% url 'UploadBarcode' %}" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="upload-container">
                {{ form.file  }}
            </div>
            <div class="button-container">
                <button class="button" type="submit">Subir</button>
            </div>
        </form>
    </div>
</body>
{% endblock content %}
